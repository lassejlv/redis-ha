# Networking
port 6379
bind 0.0.0.0
protected-mode no

# Cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-require-full-coverage no
cluster-allow-reads-when-down yes

# Persistence
appendonly yes
appendfilename "appendonly.aof"
save 900 1
save 300 10
save 60 10000

# Memory
maxmemory-policy allkeys-lru

# Logging
loglevel notice
